# netlify.toml — AIRadar deployment config
# Deploy instructions:
#   1. Push this folder to a GitHub repo
#   2. Connect repo to Netlify
#   3. In Netlify > Site settings > Environment variables, add:
#        GITHUB_TOKEN = ghp_your_token_here
#   4. Netlify will use it server-side — it never appears in client HTML

[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache HTML with short TTL so updates propagate quickly
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=60"

# Cache the function responses briefly on the CDN
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=30"
